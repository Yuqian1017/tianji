<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>天机卷任务监督器</title>
  <style>
    :root { color-scheme: light; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; background: #f4f6f8; color: #17202a; }
    main { width: min(1120px, calc(100% - 32px)); margin: 24px auto 48px; }
    header { display: grid; grid-template-columns: 1fr auto; gap: 20px; align-items: end; padding: 20px 0; border-bottom: 3px solid #8c2f39; }
    h1, h2, p { margin-top: 0; }
    h1 { margin-bottom: 6px; font-size: 28px; }
    h2 { margin-bottom: 12px; font-size: 18px; }
    .muted { color: #59636e; }
    .percent { font-size: 28px; font-weight: 750; color: #8c2f39; }
    .summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 18px 0; }
    .panel { background: #fff; border: 1px solid #d8dde3; border-radius: 6px; padding: 16px; }
    .summary .panel p { margin-bottom: 0; line-height: 1.55; }
    .phase { display: grid; grid-template-columns: 140px 1fr 72px; gap: 14px; align-items: start; padding: 14px 0; border-top: 1px solid #e4e8ec; }
    .phase:first-of-type { border-top: 0; }
    .phase strong { display: block; margin-bottom: 4px; }
    .bar { height: 8px; background: #e8ebef; margin-top: 10px; overflow: hidden; }
    .bar > span { display: block; height: 100%; background: #2f6f62; }
    .gate { display: grid; grid-template-columns: 180px 110px 1fr; gap: 12px; padding: 10px 0; border-top: 1px solid #e4e8ec; }
    .gate:first-of-type { border-top: 0; }
    .state { font-weight: 700; color: #8c2f39; }
    ul { margin: 0; padding-left: 20px; }
    li + li { margin-top: 8px; }
    @media (max-width: 760px) {
      header, .summary { grid-template-columns: 1fr; }
      .phase, .gate { grid-template-columns: 1fr; gap: 6px; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>天机卷任务监督器</h1>
        <div id="stage" class="muted">数据库与排盘正确性验证</div>
      </div>
      <div id="percent" class="percent">25%</div>
    </header>

    <section class="summary">
      <article class="panel"><h2>当前重点</h2><p id="focus">梅花易数确定性验证：起卦、互卦、变卦、动爻与体用结构。</p></article>
      <article class="panel"><h2>下一决策</h2><p id="next">全量枚举梅花输入与卦变有限域，再核对共享六十四卦表。</p></article>
      <article class="panel"><h2>反漂移规则</h2><p id="rule">正确性未取得独立证据前，暂停教学游戏和横向功能扩展。</p></article>
    </section>

    <section class="panel">
      <h2>阶段</h2>
      <div id="phases"></div>
    </section>

    <section class="panel" style="margin-top: 12px">
      <h2>门槛</h2>
      <div id="gates"></div>
    </section>

    <section class="panel" style="margin-top: 12px">
      <h2>近期证据</h2>
      <ul id="evidence"></ul>
    </section>
  </main>
  <script>
    const fallback = {
      currentStage: '数据库与排盘正确性验证',
      overallPercent: 25,
      currentFocus: '梅花易数确定性验证：起卦、互卦、变卦、动爻与体用结构；随后核对共享六十四卦表。',
      nextDecision: '全量枚举梅花输入与卦变有限域，区分可计算结构、流派口径和主观取象。',
      antiDriftRule: '数据库与排盘正确性未取得独立证据前，暂停教学/游戏实现和新的横向功能扩展。',
      phases: [
        { id: 'V0', name: '数据库与排盘正确性验证', status: 'in_progress', progress: 78, doneWhen: '八字有独立复算结论，所有 runtime 数据进入 ledger。' },
        { id: 'P0', name: '主线恢复与数据库基线', status: 'review_pending', progress: 95, doneWhen: '三份基线文档通过一致性校验并经用户确认。' },
        { id: 'P1', name: '教学核心可玩切片', status: 'pending', progress: 0, doneWhen: '完成一个学习到渡劫的可玩闭环。' },
        { id: 'P2', name: '实战工具接入学习循环', status: 'pending', progress: 0, doneWhen: '至少一个工具能回写领域掌握度。' },
        { id: 'P3', name: '多领域课程与数据库扩展', status: 'pending', progress: 0, doneWhen: '核心领域具备可溯源课程与题目。' },
        { id: 'P4', name: '叙事、NPC 与长期养成', status: 'pending', progress: 0, doneWhen: '养成机制能增强学习动机。' }
      ],
      gates: [
        { name: '排盘与数据库正确性', state: 'meihua_audit_in_progress', rule: '八字与六爻确定性结构已划定边界；梅花取得独立证据前不得作为教学规范答案源。' },
        { name: 'Product A 复用决策', state: 'partial', rule: '八字与六爻的壳层和已验证确定性结构可继续，解释层逐字段 gate。' },
        { name: '主线定义', state: 'hold', rule: 'PRD 关闭 correctness、安全与数据合同阻塞项后再确认。' },
        { name: '数据库来源可追踪', state: 'baseline_complete', rule: '规范化条目必须回指 raw source。' },
        { name: '中医安全', state: 'blocked', rule: '八字健康已硬阻断；安全元数据补齐前不扩大高风险内容消费。' },
        { name: '教学答案可信', state: 'blocked', rule: 'AI 不能单独充当规范答案源。' }
      ],
      recentEvidence: [
        '旧日柱 34 天系统偏移已在 d47165b 修复',
        '八字修复后 30 例四柱/大运 mismatch 均为 0',
        'sxtwl 第二实现 30/30 四柱一致，1,296 节令时刻最大差 20 秒',
        'sxtwl 相邻节令加经典规则独立推导 30/30 大运一致',
        '两条原典命例否证统一用神方向；身强模型已降级',
        '八字健康风险、食疗、大运健康与 AI 通道已 blocked',
        'Playwright 实测八字卡无 /100 与固定用神，八字健康按钮 disabled',
        '八字关系与神煞有限表全量匹配；两支相刑漏检已修复',
        'Playwright 桌面与 390px 移动视口实测关系区无截断或溢出',
        '合化与关系吉凶 blocked；相破保持流派差异 inactive',
        '六爻 17,026 项项目内检查与第二实现 33,408 字段比较均无差异',
        '修复乾外壬/坤外癸、近似节令和非法爻值；预测解释 not_validated',
        'Playwright 全六老阳样例桌面/390px 显示正确且无截断溢出',
        'VAL-MH-001 已启动：梅花起卦、互卦、变卦与体用结构进入全量验证',
        '六合 runtime 只显示关系；午未火/土保留为候选元数据',
        'fresh reviewer 无 Critical；陈旧 artifact Important 已修复',
        '2,592 次节令侧检查与 39,447 日连续性通过',
        'HKO 历表与 NOAA 公式锚定节令和太阳时 finding',
        'PRD fresh review 完成，结论为 hold'
      ]
    };

    function render(state) {
      document.querySelector('#stage').textContent = state.currentStage;
      document.querySelector('#percent').textContent = `${state.overallPercent}%`;
      document.querySelector('#focus').textContent = state.currentFocus;
      document.querySelector('#next').textContent = state.nextDecision;
      document.querySelector('#rule').textContent = state.antiDriftRule;
      document.querySelector('#phases').innerHTML = state.phases.map((phase) => `
        <div class="phase">
          <div><strong>${phase.id} · ${phase.name}</strong><span class="muted">${phase.status}</span></div>
          <div>${phase.doneWhen}<div class="bar"><span style="width:${phase.progress}%"></span></div></div>
          <strong>${phase.progress}%</strong>
        </div>`).join('');
      document.querySelector('#gates').innerHTML = state.gates.map((gate) => `
        <div class="gate"><strong>${gate.name}</strong><span class="state">${gate.state}</span><span>${gate.rule}</span></div>`).join('');
      document.querySelector('#evidence').innerHTML = state.recentEvidence.map((item) => `<li>${item}</li>`).join('');
    }

    render(fallback);
    fetch('./TIANJI_TASK_SUPERVISOR_STATE.json').then((response) => response.json()).then(render).catch(() => {});
  </script>
</body>
</html>
